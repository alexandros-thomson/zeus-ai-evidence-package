name: Ingest Evidence PDFs
on:
  push:
    paths:
      - 'evidence/raw/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  parse_and_validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y default-jre
          pip install -r requirements.txt
      - name: Ensure output directories exist
        run: |
          mkdir -p evidence/processed evidence/reports
      - name: Parse PDFs to CSV
        run: python scripts/parse_statements.py
      - name: Validate Totals
        run: python scripts/validate_tax_totals.py
      - name: Upload processed CSVs
        uses: actions/upload-artifact@v4
        with:
          name: processed-csvs
          path: evidence/processed/
      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: evidence/reports/
